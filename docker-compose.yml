# =============================================================================
# ClawBot — Project stack
# =============================================================================
# Attaches to the shared `edge_net` network provided by /root/projects/platform.
# Traefik + Authelia live in platform/. This file only defines clawbot's
# own services and their routing labels.
#
# Start order: `cd ../platform && docker compose up -d` first, then this stack.
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # OpenClaw Gateway — AI Assistant
  # ---------------------------------------------------------------------------
  openclaw-gateway:
    build:
      context: ./openclaw
      dockerfile: Dockerfile
    container_name: openclaw-gateway
    restart: unless-stopped
    environment:
      HOME: /home/node
      TERM: xterm-256color
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
      OPENCLAW_GATEWAY_BIND: lan
    volumes:
      - ${OPENCLAW_CONFIG_DIR:-./openclaw/config}:/home/node/.openclaw
    networks:
      - edge_net
    depends_on:
      - ollama
    labels:
      - "traefik.enable=true"
      # --- Clawbot-local middleware: strip /openclaw prefix ---
      - "traefik.http.middlewares.openclaw-strip.stripprefix.prefixes=/openclaw"
      - "traefik.http.middlewares.openclaw-chain.chain.middlewares=noindex-headers@file,security-headers@file,rate-limit@file,authelia@file,openclaw-strip"
      # --- HTTP router: WebUI + API behind auth, strip /openclaw prefix ---
      - "traefik.http.routers.openclaw.rule=Host(`${DOMAIN}`) && PathPrefix(`/openclaw`)"
      - "traefik.http.routers.openclaw.entrypoints=websecure"
      - "traefik.http.routers.openclaw.tls.certresolver=letsencrypt"
      - "traefik.http.routers.openclaw.middlewares=openclaw-chain"
      - "traefik.http.routers.openclaw.priority=50"
      # --- WebSocket router: UI connects to wss://host/ (root path) ---
      - "traefik.http.routers.openclaw-ws.rule=Host(`${DOMAIN}`) && HeaderRegexp(`Connection`, `(?i)upgrade`) && HeaderRegexp(`Upgrade`, `(?i)websocket`)"
      - "traefik.http.routers.openclaw-ws.entrypoints=websecure"
      - "traefik.http.routers.openclaw-ws.tls.certresolver=letsencrypt"
      - "traefik.http.routers.openclaw-ws.middlewares=default-chain@file"
      - "traefik.http.routers.openclaw-ws.priority=100"
      - "traefik.http.routers.openclaw-ws.service=openclaw"
      - "traefik.http.services.openclaw.loadbalancer.server.port=18789"

  # ---------------------------------------------------------------------------
  # Dashboard — Next.js Overview Board (OpenClaw metrics)
  # ---------------------------------------------------------------------------
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: clawbot-dashboard
    restart: unless-stopped
    environment:
      OPENCLAW_GATEWAY_URL: http://openclaw-gateway:18789
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
      OPENCLAW_CONFIG_PATH: /home/node/.openclaw
    volumes:
      - ${OPENCLAW_CONFIG_DIR:-./openclaw/config}:/home/node/.openclaw:ro
    networks:
      - edge_net
    depends_on:
      - openclaw-gateway
    labels:
      - "traefik.enable=true"
      # Dashboard mounted at /clawbot — Next.js handles basePath natively,
      # so no stripPrefix; assets load from /clawbot/_next/*.
      - "traefik.http.routers.clawbot-dashboard.rule=Host(`${DOMAIN}`) && PathPrefix(`/clawbot`)"
      - "traefik.http.routers.clawbot-dashboard.entrypoints=websecure"
      - "traefik.http.routers.clawbot-dashboard.tls.certresolver=letsencrypt"
      - "traefik.http.routers.clawbot-dashboard.middlewares=default-chain@file"
      - "traefik.http.routers.clawbot-dashboard.priority=50"
      - "traefik.http.services.clawbot-dashboard.loadbalancer.server.port=3000"

  # ---------------------------------------------------------------------------
  # Ollama — Local LLM for Free Heartbeats
  # ---------------------------------------------------------------------------
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - edge_net

# =============================================================================
# Volumes — persistent data stored outside the repo
# =============================================================================
volumes:
  ollama-data:
    driver: local

# =============================================================================
# Network — joins the shared edge network created by platform/
# =============================================================================
networks:
  edge_net:
    external: true
    name: edge_net
